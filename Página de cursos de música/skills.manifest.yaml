# Registro unificado de skills — Gmusic Estudio
# Fuente de verdad: .agents/skills/
# Sincronizar: ./scripts/sync-skills.sh [--global]

version: 1
canonical_path: .agents/skills

naming:
  rule: "Carpeta = frontmatter name = kebab-case. Skills propios con prefijo gmusic-."
  examples:
    - gmusic-welcome
    - gmusic-path
    - openai-docs

skills:
  # ── Proyecto Gmusic (versionados en git) ──
  - name: gmusic-welcome
    description: Mi Estudio — dashboard premium, hero, próxima práctica, métricas
    tools: [cursor, codex, antigravity]
    scope: project
    path: .agents/skills/gmusic-welcome

  - name: gmusic-path
    description: Mi Camino — ruta pedagógica, mapa serpenteante, header interno
    tools: [cursor, codex, antigravity]
    scope: project
    path: .agents/skills/gmusic-path

  - name: gmusic-edu-gamified-design
    description: Diseño de cursos gamificados tipo Duolingo, adaptado a Gmusic sin copiar marca
    tools: [cursor, codex, antigravity]
    scope: project
    path: .agents/skills/gmusic-edu-gamified-design

  - name: gmusic-game-progression-architecture
    description: Matriz Academia 3×3, funnel Semestral, bloqueo WCAG AA y arquitectura de progresión
    tools: [cursor, codex, antigravity]
    scope: project
    path: .agents/skills/gmusic-game-progression-architecture

  - name: gmusic-visual-vfx
    description: VFX y atmósfera — ChunkyButton, LED WebKit-safe, elevación tokenizada y cofre Radix
    tools: [cursor, codex, antigravity]
    scope: project
    path: .agents/skills/gmusic-visual-vfx

  - name: gmusic-learning-engine
    description: Motor de aprendizaje — backend, Prisma, microejercicios, progreso, XP, rachas y apoderados
    tools: [cursor, codex, antigravity]
    scope: project
    path: .agents/skills/gmusic-learning-engine

  - name: gmusic-opus-architect
    description: Opus arquitecto — Superpowers brainstorming/plans, specs docs/vision, brief para Cursor
    tools: [opus, claude]
    scope: project
    path: .agents/skills/gmusic-opus-architect

  - name: gmusic-agent-workflow
    description: Protocolo ejecutor — tests, reportes, no commit sin autorización (Cursor)
    tools: [cursor, codex]
    scope: project
    path: .agents/skills/gmusic-agent-workflow

  # ── Superpowers (vendor → .agents/vendor/superpowers; install: scripts/install-superpowers-opus.sh) ──
  - name: superpowers-brainstorming
    description: Superpowers — diseño Socratico antes de implementar (Opus)
    tools: [opus, claude]
    scope: vendor
    path: .agents/skills/superpowers-brainstorming

  - name: superpowers-writing-plans
    description: Superpowers — planes bite-sized para ejecutor (Opus → Cursor)
    tools: [opus, claude]
    scope: vendor
    path: .agents/skills/superpowers-writing-plans

  - name: superpowers-using-superpowers
    description: Superpowers — enrutamiento de skills
    tools: [opus, claude, cursor]
    scope: vendor
    path: .agents/skills/superpowers-using-superpowers

  - name: superpowers-verification-before-completion
    description: Superpowers — verificar spec/plan antes de handoff
    tools: [opus, claude]
    scope: vendor
    path: .agents/skills/superpowers-verification-before-completion
  - name: openai-docs
    description: Documentación oficial OpenAI + manual Codex (MCP developers.openai.com)
    tools: [codex, cursor]
    scope: external
    source: ~/.codex/skills/.system/openai-docs
    sync_global: false

  - name: figma
    description: Figma MCP — design-to-code e implementación
    tools: [codex, cursor]
    scope: external
    source: ~/.codex/skills/figma
    sync_global: false

  - name: vercel-deploy
    description: Deploy a Vercel
    tools: [codex, cursor]
    scope: external
    source: ~/.codex/skills/vercel-deploy
    sync_global: false

tool_paths:
  cursor:
    project: .cursor/skills
    user: ~/.cursor/skills
  codex:
    global: ~/.codex/skills
    project: .agents/skills
  antigravity:
    global: ~/.gemini/skills
